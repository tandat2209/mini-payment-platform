services:
  postgres:
    image: postgres:16-alpine
    container_name: payment-platform-mini-postgres
    environment:
      POSTGRES_DB: payment_platform_mini
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d payment_platform_mini']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
